services:
  sukhoi:
    # Use pre-built GHCR image:
    #   SUKHOI_IMAGE=ghcr.io/your-org/sukhoi:latest docker compose up -d
    #
    # Build locally (default):
    #   docker compose up -d --build
    image: ${SUKHOI_IMAGE:-}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Mount Docker socket so sukhoi can spawn runner containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount config for hot reload without rebuild
      - ./sukhoi.config.json:/app/sukhoi.config.json:ro
    restart: unless-stopped
