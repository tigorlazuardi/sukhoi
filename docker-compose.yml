services:
  sukhoi:
    # Use pre-built GHCR image:
    #   SUKHOI_IMAGE=ghcr.io/tigorlazuardi/sukhoi:latest docker compose up -d
    #
    # Build locally (default):
    #   docker compose up -d --build
    image: ${SUKHOI_IMAGE:-}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Mount config for hot reload without rebuild
      - ./sukhoi.config.json:/app/sukhoi.config.json:ro
      # Persistent repo cache — shared across all job runs
      - sukhoi-repos:/repo-cache
    restart: unless-stopped

volumes:
  # Persistent repo cache: avoids full re-clone on every task.
  # entrypoint.sh does git fetch + reset --hard instead.
  sukhoi-repos:
