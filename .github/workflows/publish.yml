name: Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # e.g. ghcr.io/tigor/sukhoi and ghcr.io/tigor/sukhoi-runner
  IMAGE_NAME: ${{ github.repository }}
  RUNNER_IMAGE_NAME: ${{ github.repository }}-runner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Tags helper ──────────────────────────────────────────────────────────
      # On push to main     → :latest
      # On push tag v1.2.3  → :v1.2.3 and :latest
      # On workflow_dispatch → :latest

      - name: Extract metadata for sukhoi (main service)
        id: meta-sukhoi
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Extract metadata for sukhoi-runner
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNNER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── Build & push sukhoi (main service) ──────────────────────────────────

      - name: Build and push sukhoi
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-sukhoi.outputs.tags }}
          labels: ${{ steps.meta-sukhoi.outputs.labels }}
          cache-from: type=gha,scope=sukhoi
          cache-to: type=gha,mode=max,scope=sukhoi
          platforms: linux/amd64,linux/arm64

      # ── Build & push sukhoi-runner ───────────────────────────────────────────

      - name: Build and push sukhoi-runner
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          cache-from: type=gha,scope=sukhoi-runner
          cache-to: type=gha,mode=max,scope=sukhoi-runner
          platforms: linux/amd64,linux/arm64

      # ── Summary ──────────────────────────────────────────────────────────────

      - name: Summary
        run: |
          echo "## Images published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**sukhoi:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-sukhoi.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**sukhoi-runner:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-runner.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
